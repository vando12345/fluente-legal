<!DOCTYPE html>

  <title>Fluente — Informações Legais</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #f0ecf8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; }

    .links { display: flex; flex-direction: column; gap: 14px; }
    a { display: block; padding: 16px 24px; border-radius: 18px; font-size: 15px; font-weight: 800; text-decoration: none; transition: transform 0.15s, box-shadow 0.15s; font-family: 'Nunito', sans-serif; }
    a:hover { transform: translateY(-2px); }
    .btn-primary { background: linear-gradient(135deg, #7c5ce3, #6a3fd4); color: white; box-shadow: 0 4px 20px rgba(124,92,227,0.35); }
    .btn-secondary { background: #f0ecf8; color: #7c5ce3; border: 2px solid #ede9fc; }
    .footer { margin-top: 24px; font-size: 12px; color: #aaa; font-weight: 600; }
  </style>
</head>

    </div>
  </div>

</body>
</html>

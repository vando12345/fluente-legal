<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluente — Informações Legais</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #f0ecf8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 8px 40px rgba(124,92,227,0.12);
      max-width: 480px;
      width: 100%;
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #7c5ce3, #6a3fd4);
      padding: 40px 40px 32px;
      text-align: center;
      color: white;
    }
    .logo { font-size: 52px; margin-bottom: 10px; }
    h1 { font-size: 26px; font-weight: 900; }
    .tagline { font-size: 14px; font-weight: 600; opacity: 0.85; margin-top: 4px; }
    .card-body { padding: 32px 36px 36px; }
    p {
      font-size: 14px;
      color: #666;
      font-weight: 600;
      margin-bottom: 28px;
      line-height: 1.6;
      text-align: center;
    }
    .links { display: flex; flex-direction: column; gap: 12px; }
    a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      border-radius: 18px;
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: 'Nunito', sans-serif;
    }
    a:hover { transform: translateY(-2px); }
    .btn-privacy {
      background: linear-gradient(135deg, #7c5ce3, #6a3fd4);
      color: white;
      box-shadow: 0 4px 20px rgba(124,92,227,0.35);
    }
    .btn-delete {
      background: #fef2f2;
      color: #dc2626;
      border: 2px solid #fecaca;
    }
    .btn-delete:hover { box-shadow: 0 4px 20px rgba(239,68,68,0.2); }
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #aaa;
      font-weight: 600;
    }
    @media (max-width: 480px) {
      .card-body { padding: 24px 20px 28px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo">🐦</div>
      <h1>Fluente</h1>
      <div class="tagline">Aprenda Idiomas com IA</div>
    </div>
    <div class="card-body">
      <p>Informações legais e políticas do aplicativo Fluente — aqui você encontra tudo sobre privacidade e dados.</p>
      <div class="links">
        <a class="btn-privacy" href="./politica-de-privacidade.html">📄 Política de Privacidade</a>
        <a class="btn-delete" href="./delete-account.html">🗑️ Solicitar Exclusão de Conta</a>
      </div>
    </div>
  </div>
  <p class="footer">Fluente · vandomacielbr@gmail.com · LGPD Compliant</p>
</body>
</html>
